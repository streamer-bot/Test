name: Release
on:
  workflow_dispatch:
    inputs:
      version_number:
        description: "version number:"
        required: true
        default: ""
      branch_name:
        description: "Branch to pull from:"
        required: false
        default: "main"

jobs:
  prepare_and_finalize:
    runs-on: macos-latest
    outputs:
      version_number: ${{ github.event.inputs.version_number }}
      commit_sha: ${{ steps.push_xcconfig_changes.outputs.commit_hash }}
      original_build_number: ${{ steps.get_original_build.outputs.original_build_number }}
    steps:
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: latest-stable

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ secrets.REPOSITORY }}
          token: ${{ secrets.REPOSITORY_GITHUB_TOKEN }}
          ref: ${{ github.event.inputs.branch_name }}
      
      - name: Update Fastlane
        run: bundle update fastlane
      
      - name: Bundle Install
        run: bundle install

      - name: Get original build number
        id: get_original_build
        run: |
          value=$(grep -E "^CURRENT_PROJECT_VERSION\\s*=\\s*" xcconfig/Project-Shared.xcconfig | awk -F '= ' '{print $2}' | tr -d '[:space:]')
          echo "Original build number: $value"
          echo "original_build_number=$value" >> $GITHUB_OUTPUT
        shell: bash

      - name: Run Prepare Release Step
        run: bundle exec fastlane ios prepare_release_step version_number:${{ github.event.inputs.version_number }}

      - name: Commit and Push xcconfig changes
        id: push_xcconfig_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xcconfig/Project-Shared.xcconfig
          git commit -m "Automated: Update xcconfig files for release v${{ github.event.inputs.version_number }}"
          git push origin HEAD:${{ github.event.inputs.branch_name }}
          echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.REPOSITORY_GITHUB_TOKEN }}

  build_platform:
    needs: prepare_and_finalize
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, tvos, mac]
        include:
          - platform: ios
            lane: build_ios_lane
            artifact_name_ipa: Streamer-iOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.ipa
            artifact_name_deb: streamer-iOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.deb
            artifact_name_dsym: Streamer-iOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.app.dSYM.zip
            base_ipa: Streamer-iOS.ipa
            base_deb: streamer-iOS.deb
            base_dsym: Streamer-iOS.app.dSYM.zip
          - platform: tvos
            lane: build_tvos_lane
            artifact_name_ipa: Streamer-tvOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.ipa
            artifact_name_deb: streamer-tvOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.deb
            artifact_name_dsym: Streamer-tvOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.app.dSYM.zip
            base_ipa: Streamer-tvOS.ipa
            base_deb: streamer-tvOS.deb
            base_dsym: Streamer-tvOS.app.dSYM.zip
          - platform: mac
            lane: build_mac_lane
            artifact_name_dmg: Streamer-mac-v${{ needs.prepare_and_finalize.outputs.version_number }}.dmg
            artifact_name_dsym: Streamer-Mac-v${{ needs.prepare_and_finalize.outputs.version_number }}.app.dSYM.zip
            base_dmg: Streamer-mac.dmg
            base_dsym: Streamer-Mac.app.dSYM.zip
            
    steps:
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: latest-stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dpkg (if needed by permasigner/packaging scripts)
        if: matrix.platform == 'ios' || matrix.platform == 'tvos'
        run: brew install dpkg
      
      - name: Install permasigner (if needed)
        if: matrix.platform == 'ios' || matrix.platform == 'tvos'
        run: pip3 install -U permasigner --break-system-packages --ignore-installed
      
      - name: Install create-dmg (if needed)
        if: matrix.platform == 'mac'
        run: brew install create-dmg

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ secrets.REPOSITORY }}
          token: ${{ secrets.REPOSITORY_GITHUB_TOKEN }}
          ref: ${{ needs.prepare_and_finalize.outputs.commit_sha || github.event.inputs.branch_name }}

      - name: Cache Swift Packages
        uses: actions/cache@v3
        id: packages-cache
        with:
          path: |
            packages_cache/artifacts
            packages_cache/checkouts
            packages_cache/workspace_state.json
          key: ${{ runner.os }}-packages-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-packages-
      
      - name: Update Header Search Paths (if still necessary globally)
        run: |
          echo "Updating Xcode project settings..."
          export HEADER_SEARCH_PATHS="$(PROJECT_DIR)/KSPlayer/FFmpegKit/Sources/Libavutil.xcframework/ios-arm64/Libavutil.framework/Headers"
          echo "HEADER_SEARCH_PATHS set to: $HEADER_SEARCH_PATHS"

      - name: Update Fastlane
        run: bundle update fastlane
      
      - name: Bundle Install
        run: bundle install

      - name: Build ${{ matrix.platform }}
        run: bundle exec fastlane ios ${{ matrix.lane }} version_number:${{ needs.prepare_and_finalize.outputs.version_number }} has_packages_cache_hit:${{ steps.packages-cache.outputs.cache-hit == 'true' }}
        env:
          HAS_PACKAGES_CACHE_HIT: ${{ steps.packages-cache.outputs.cache-hit == 'true' }}

      - name: Rename build artifacts with version
        run: |
          if [ -f "${{ matrix.base_ipa }}" ]; then
            mv "${{ matrix.base_ipa }}" "${{ matrix.artifact_name_ipa }}"
          fi
          if [ -f "${{ matrix.base_deb }}" ]; then
            mv "${{ matrix.base_deb }}" "${{ matrix.artifact_name_deb }}"
          fi
          if [ -f "${{ matrix.base_dmg }}" ]; then
            mv "${{ matrix.base_dmg }}" "${{ matrix.artifact_name_dmg }}"
          fi
          if [ -f "${{ matrix.base_dsym }}" ]; then
            mv "${{ matrix.base_dsym }}" "${{ matrix.artifact_name_dsym }}"
          fi

      - name: Upload ${{ matrix.platform }} IPA artifact
        if: matrix.artifact_name_ipa != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_ipa }}
          path: ${{ matrix.artifact_name_ipa }}
          if-no-files-found: error

      - name: Upload ${{ matrix.platform }} DEB artifact
        if: matrix.artifact_name_deb != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_deb }}
          path: ${{ matrix.artifact_name_deb }}
          if-no-files-found: error
      
      - name: Upload ${{ matrix.platform }} DMG artifact
        if: matrix.artifact_name_dmg != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_dmg }}
          path: ${{ matrix.artifact_name_dmg }}
          if-no-files-found: error

      - name: Upload ${{ matrix.platform }} dSYM artifact
        if: matrix.artifact_name_dsym != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_dsym }}
          path: ${{ matrix.artifact_name_dsym }}
          if-no-files-found: error
      

  rollback_build_number:
    needs: [prepare_and_finalize, build_platform]
    if: failure()
    runs-on: macos-latest
    name: Rollback Build Number
    steps:
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: latest-stable

      - name: Checkout code at the commit with bumped build number
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ secrets.REPOSITORY }}
          token: ${{ secrets.REPOSITORY_GITHUB_TOKEN }}
          ref: ${{ needs.prepare_and_finalize.outputs.commit_sha || github.event.inputs.branch_name }}

      - name: Setup Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Revert build number in xcconfig
        run: |
          echo "Reverting CURRENT_PROJECT_VERSION to ${{ needs.prepare_and_finalize.outputs.original_build_number }}"
          bundle exec fastlane run update_xcconfig_value \
            path:xcconfig/Project-Shared.xcconfig \
            name:CURRENT_PROJECT_VERSION \
            value:"${{ needs.prepare_and_finalize.outputs.original_build_number }}"
        env:
          ORIGINAL_BUILD_NUMBER: ${{ needs.prepare_and_finalize.outputs.original_build_number }}

      - name: Commit and Push reverted build number
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xcconfig/Project-Shared.xcconfig
          git commit -m "Automated: Rollback build number due to build failure (v${{ needs.prepare_and_finalize.outputs.version_number }})"
          git push origin HEAD:${{ github.event.inputs.branch_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.REPOSITORY_GITHUB_TOKEN }}

  finalize_and_release:
    needs: [prepare_and_finalize, build_platform]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded files (for debugging)
        run: |
          ls -R
          echo "Current directory structure:"
          find . -type f -print
      
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: "Release v${{ needs.prepare_and_finalize.outputs.version_number }}"
          prerelease: true
          name: v${{ needs.prepare_and_finalize.outputs.version_number }}-prerelease-${{ github.run_id }}
          tag_name: v${{ needs.prepare_and_finalize.outputs.version_number }}-prerelease-${{ github.run_id }}
          files: |
            Streamer-iOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.ipa/Streamer-iOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.ipa
            Streamer-tvOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.ipa/Streamer-tvOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.ipa
            Streamer-mac-v${{ needs.prepare_and_finalize.outputs.version_number }}.dmg/Streamer-mac-v${{ needs.prepare_and_finalize.outputs.version_number }}.dmg
            streamer-iOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.deb/streamer-iOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.deb
            streamer-tvOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.deb/streamer-tvOS-v${{ needs.prepare_and_finalize.outputs.version_number }}.deb
